services:
  app:
    restart: always
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        # Substituted from an .env file next to this compose file (or the
        # shell environment). Baked into the bundle at build time.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
    ports:
      # host:container — exposed for an upstream reverse proxy to route to.
      - 3000:3000
